<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Monitor</title>

    <!-- Librerie Esterne -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" link rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Collegamento al file CSS nella cartella 'static' -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1><i class="fa-solid fa-house-signal"></i>Dashboard</h1>
    <p>Monitoraggio in tempo reale • Aggiornamento ogni 2s</p>
</header>

<div class="dashboard-grid">
    <!-- Loop Jinja2 per generare le card -->
    {% for room in rooms %}
    <div class="card-container" onclick="flipCard(this)">
        <div class="card-inner">
            
            <!-- LATO ANTERIORE (FRONT) -->
            <div class="card-face front">
                <div class="room-title">
                    {{ room.name }} <i class="fa-solid fa-layer-group"></i>
                </div>
                
                <div class="metrics-container">
                    <div class="metric">
                        <span id="temp-{{ room.id }}" class="metric-value">--</span>
                        <div class="metric-label"><i class="fa-solid fa-temperature-half"></i> °C</div>
                    </div>
                    <div class="metric">
                        <span id="hum-{{ room.id }}" class="metric-value" style="color: var(--primary)">--</span>
                        <div class="metric-label"><i class="fa-solid fa-droplet"></i> %</div>
                    </div>
                </div>

                <div class="chart-mini-container">
                    <canvas id="chart-doughnut-{{ room.id }}"></canvas>
                </div>
                <div class="hint"><i class="fa-solid fa-rotate"></i> Clicca per lo storico</div>
            </div>

            <!-- LATO POSTERIORE (BACK) -->
            <div class="card-face back">
                <div class="room-title">{{ room.name }} - Storico</div>
                <div>
                    <h3>Temperatura</h3>
                    <div class="chart-full-container"><canvas id="chart-line-temp-{{ room.id }}"></canvas></div>
                </div>
                <div>
                    <h3>Umidità</h3>
                    <div class="chart-full-container"><canvas id="chart-line-hum-{{ room.id }}"></canvas></div>
                </div>
            </div>

        </div>
    </div>
    {% endfor %}
</div>

<!-- BRIDGE DATA: Passiamo la configurazione stanze da Python a JS -->
<script>
    window.SERVER_DATA = {{ rooms | tojson | safe }};
</script>

<!-- Collegamento al file JS nella cartella 'static' -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
